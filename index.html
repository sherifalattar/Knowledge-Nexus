<script>
/* Knowledge Nexus — cinematic entrance: Enter starts the music, holds black, then lands on the Observatory */
(function(){
  if(window.__knEnterWired) return; window.__knEnterWired=1;
  document.addEventListener('click', function(ev){
    var t=ev.target, a=t&&(t.closest?t.closest('a'):null); if(!a) return;
    var h=a.getAttribute('href')||'';
    if(!(/observatory\.html$/.test(h) && /enter/i.test(a.textContent||''))) return;
    ev.preventDefault();
    if(window.__knEntering) return; window.__knEntering=1;
    try{ if(window.knAudioArm) window.knAudioArm(); }catch(_){}      /* begin ambient music within this click */
    try{ sessionStorage.setItem('kn-entering','1'); }catch(_){}      /* tell the Observatory to fade in from black */
    var c=document.createElement('div');
    c.style.cssText='position:fixed;inset:0;z-index:2147483600;background:#000;opacity:0;transition:opacity 1.2s ease';
    document.documentElement.appendChild(c);
    requestAnimationFrame(function(){ c.style.opacity='1'; });
    setTimeout(function(){ window.location.href='observatory.html'; }, 1200);   /* 10s black pause */
  }, true);
})();
</script>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

:block;color:#9BA6BE;\">\n        <span style=\"display:inline-block;opacity:0;animation-delay:2.02s;\">N<\u002Fspan><span style=\"display:inline-block;opacity:0;animation-delay:2.07s;\">E<\u002Fspan><span style=\"display:inline-block;opacity:0;animation-delay:2.12s;\">X<\u002Fspan><span style=\"display:inline-block;opacity:0;animation-delay:2.17s;\">U<\u002Fspan><span style=\"display:inline-block;opacity:0;animation-delay:2.22s;\">S<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fh1>\n\n    <p style=\"max-width:540px;margin:30px 0 0;font-family:'Inter',sans-serif;font-weight:400;font-size:clamp(13px,1.45vw,16px);line-height:1.6;color:#828BA0;text-wrap:pretty;opacity:0;animation:fadeUp 1s ease both;animation-delay:2.6s;\">A self-working synthesis — bridging medicine, insurance regulations, coding rules, data analysis and design into a single masterpiece.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- reference nodes -->\n  <div ref=\"{{ nodesLayerRef }}\" style=\"position:absolute;inset:0;pointer-events:none;z-index:4;\">\n\n    <a href=\"drgs-compendium.html\" data-idx=\"0\" ref=\"{{ nodeRef0 }}\" onmouseenter=\"{{ onNodeEnter }}\" onmouseleave=\"{{ onNodeLeave }}\" style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;text-decoration:none;pointer-events:auto;opacity:0;transition:filter .25s ease;will-change:transform;\" style-hover=\"filter:brightness(1.55)\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.46em;text-transform:uppercase;margin-bottom:6px;color:#5E6A86;background:linear-gradient(90deg,#444E6A 0%,#5E6A86 42%,#B4BBCB 50%,#5E6A86 58%,#444E6A 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4.5s linear infinite;\">01 · Flagship<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-weight:600;font-size:17px;color:#D7DCE8;letter-spacing:.005em;\">DRGs Compendium<\u002Fdiv>\n    <\u002Fa>\n\n    <a href=\"psychiatry-ir-drg-tree.html\" data-idx=\"1\" ref=\"{{ nodeRef1 }}\" onmouseenter=\"{{ onNodeEnter }}\" onmouseleave=\"{{ onNodeLeave }}\" style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;text-decoration:none;pointer-events:auto;opacity:0;transition:filter .25s ease;will-change:transform;\" style-hover=\"filter:brightness(1.55)\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.46em;text-transform:uppercase;margin-bottom:6px;color:#5E6A86;background:linear-gradient(90deg,#444E6A 0%,#5E6A86 42%,#B4BBCB 50%,#5E6A86 58%,#444E6A 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4.5s linear infinite;\">02 · Psychiatry<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-weight:600;font-size:17px;color:#D7DCE8;letter-spacing:.005em;\">Triangulated Lens<\u002Fdiv>\n    <\u002Fa>\n\n    <a href=\"codes-global-atlas.html\" data-idx=\"2\" ref=\"{{ nodeRef2 }}\" onmouseenter=\"{{ onNodeEnter }}\" onmouseleave=\"{{ onNodeLeave }}\" style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;text-decoration:none;pointer-events:auto;opacity:0;transition:filter .25s ease;will-change:transform;\" style-hover=\"filter:brightness(1.55)\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.46em;text-transform:uppercase;margin-bottom:6px;color:#5E6A86;background:linear-gradient(90deg,#444E6A 0%,#5E6A86 42%,#B4BBCB 50%,#5E6A86 58%,#444E6A 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4.5s linear infinite;\">03 · Adjudication<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-weight:600;font-size:17px;color:#D7DCE8;letter-spacing:.005em;\">Denial Navigator<\u002Fdiv>\n    <\u002Fa>\n\n    <a href=\"setting-of-c nodeRef5 }}\" onmouseenter=\"{{ onNodeEnter }}\" onmouseleave=\"{{ onNodeLeave }}\" style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);white-space:nowrap;text-decoration:none;pointer-events:auto;opacity:0;transition:filter .25s ease;will-change:transform;\" style-hover=\"filter:brightness(1.55)\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.46em;text-transform:uppercase;margin-bottom:6px;color:#5E6A86;background:linear-gradient(90deg,#444E6A 0%,#5E6A86 42%,#B4BBCB 50%,#5E6A86 58%,#444E6A 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4.5s linear infinite;\">06 · About<\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-weight:600;font-size:17px;color:#D7DCE8;letter-spacing:.005em;\">Dr. Sherif Alattar<\u002Fdiv>\n    <\u002Fa>\n  <\u002Fdiv>\n\n  <!-- bottom hint -->\n  <div style=\"position:absolute;bottom:34px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:13px;pointer-events:none;z-index:5;opacity:0;animation:fadeIn 1s ease both;animation-delay:4.0s;\">\n    <div style=\"width:38px;height:1px;background:linear-gradient(90deg,transparent,#6E8BFF,transparent);\"><\u002Fdiv>\n    <a href=\"observatory.html\" style=\"text-decoration:none;pointer-events:auto\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.36em;color:#6E7890;text-transform:uppercase;cursor:pointer\">Enter<\u002Fdiv><\u002Fa>\n  <\u002Fdiv>\n\n  <!-- faint corner mark -->\n  <div style=\"position:absolute;left:34px;bottom:32px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.16em;color:#3A4150;text-transform:uppercase;pointer-events:none;z-index:5;opacity:0;animation:fadeIn 1s ease both;animation-delay:4.3s;\">Archivo · Inter · JetBrains&nbsp;Mono<\u002Fdiv>\n  <div style=\"position:absolute;right:34px;bottom:32px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.16em;color:#3A4150;text-transform:uppercase;pointer-events:none;z-index:5;opacity:0;animation:fadeIn 1s ease both;animation-delay:4.3s;\">Nexus · 2026<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:860},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;#6E8BFF&quot;,&quot;#5FB3C9&quot;,&quot;#FFFFFF&quot;],&quot;default&quot;:&quot;#6E8BFF&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Low&quot;,&quot;Medium&quot;,&quot;High&quot;],&quot;default&quot;:&quot;Medium&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showGrid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  canvasRef = React.createRef();\n  nodesLayerRef = React.createRef();\n  titleLayerRef = React.createRef();\n  rootRef = React.createRef();\n  nodeRef0 = React.createRef();\n  nodeRef1 = React.createRef();\n  nodeRef2 = React.createRef();\n  nodeRef3 = React.createRef();\n  nodeRef4 = React.createRef();\n  nodeRef5 = React.createRef();\n\n  nodes = [\n    {ang0: -Math.PI/2,                  rf:1.00},\n    {ang0: -Math.PI/2 + Math.PI/3,      rf:0.88},\n    {ang0: -Math.PI/2 + 2*Math.PI/3,    rf:1.08},\n    {ang0: -Math.PI/2 + Math.PI,        rf:0.94},\n    {ang0: -Math.PI/2 + 4*Math.PI/3,    rf:1.05},\n    {ang0: -Math.PI/2 + 5*Math.PI/3,    rf:0.90}\n  ];\n  orbitSpeed = 0.05;\n  hovered = -1;\n  mx = 0.5; my = 0.5; tmx = 0.5; tmy = 0.5;\n  start = 0; last = 0; raf = 0;\n  particles = [];\n\n  hexToRgb(h){\n    h = (h||'').replace('#','');\n    if (h.length === 3) h = h.split('').map(c => c+c).join('');\n    const n = parseInt(h || '6e8bff', 16);\n    return [(n>>16)&255, (n>>8)&255, n&255];\n  }\n\n  initParticles(n){\n    this.particles = Array.from({length:n}, () => ({\n      x: Math.random(), y: Math.random(),\n      vx: (Math.random()-0.5)*0.00003, vy: (Math.random()-0.5)*0.00003,\n      r: Math.random()*1.5+0.4, a: Math.random()*0.5+0.18, ph: Math.random()*Math.PI*2\n    }));\n  }\n\n  resize(){\n    const c = this.canvasRef.current; if (!c) return;\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const w = c.clientWidth || window.innerWidth, h = c.clientHeight || window.innerHeight;\n    c.width = w*dpr; c.height = h*dpr;\n    const ctx = c.getContext('2d');\n    ctx.setTransform(dpr,0,0,dpr,0,0);\n    this.W = w; this.H = h; this.ctx = ctx;\n  }\n\n  componentDidMount(){\n    this.resize();\n    this.initParticles(90);\n    this.start = 0; this.last = 0;\n    this._onResize = () => this.resize();\n    this._onMove = (e) => { this.tmx = e.clientX/window.innerWidth; this.tmy = e.clientY/window.innerHeight; };\n    window.addEventListener('resize', this._onResize);\n    window.addEventListener('pointermove', this._onMove);\n    const loop = (t) => { this.draw(t); this.raf = requestAnimationFrame(loop); };\n    this.raf = requestAnimationFrame(loop);\n  }\n\n  componentWillUnmount(){\n    cancelAnimationFrame(this.raf);\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('pointermove', this._onMove);\n  }\n\n  draw(now){\n    const ctx = this.ctx, W = this.W, H = this.H;\n    if (!ctx) return;\n    if (!this.start) { this.start = now + 2000; this.last = now; }\n    const dt = Math.min(now - this.last, 50); this.last = now;\n    const el = (now - this.start)/1000;\n    if (el < 0){ ctx.fillStyle = '#070A11'; ctx.fillRect(0,0,W,H); return; }\n\n    const showGrid = this.props.showGrid ?? true;\n    const acc = this.hexToRgb(this.props.accent ?? '#6E8BFF');\n    const A = `${acc[0]},${acc[1]},${acc[2]}`;\n    const dens = ({Low:55, Medium:90, High:140})[this.props.density ?? 'Medium'] || 90;\n    if (this.particles.length !== dens) this.initParticles(dens);\n\n    // smoothed parallax\n    this.mx += (this.tmx - this.mx)*0.05;\n    this.my += (this.tmy - this.my)*0.05;\n    const amp = Math.min(W,H)*0.02;\n    const offx = (this.mx-0.5)*amp*2, offy = (this.my-0.5)*amp*2;\n    if (this.nodesLayerRef.current) this.nodesLayerRef.current.style.transform = `translate(${offx}px,${offy}px)`;\n    if (this.titleLayerRef.current) this.titleLayerRef.current.style.transform = `translate(${offx*0.4}px,${offy*0.4}px)`;\n\n    // title letters assemble (rAF-driven so it survives CSS-timeline throttling)\n    if ((!this._letters || this._letters.length !== 14) && this.titleLayerRef.current) {\n      const found = this.titleLayerRef.current.querySelectorAll('h1 span span');\n      if (found.length === 14) this._letters = found;\n    }\n    if (this._letters) {\n      for (let i=0;i<this._letters.length;i++){\n        const p = Math.max(0, Math.min((el - (1.0 + i*0.05))/0.9, 1));\n        const e = p<1 ? (1-Math.pow(1-p,3)) : 1;\n        const L = this._letters[i];\n        L.style.opacity = e.toFixed(3);\n        L.style.transform = `translateY(${((1-e)*0.42).toFixed(3)}em) scale(${(0.55+0.45*e).toFixed(3)})`;\n        L.style.filter = e<1 ? `blur(${((1-e)*9).toFixed(2)}px)` : 'none';\n      }\n    }\n\n    ctx.fillStyle = '#070A11';\n    ctx.fillRect(0,0,W,H);\n    ctx.save();\n    ctx.translate(offx, offy);\n\n    const cx = W*0.5, cy = H*0.5;\n    const minD = Math.min(W,H);\n    const introFade = Math.min(el/1.5, 1);\n    const refs = [this.nodeRef0,this.nodeRef1,this.nodeRef2,this.nodeRef3,this.nodeRef4,this.nodeRef5];\n    const Rx = Math.max(W*0.22, Math.min(W*0.40, W/2 - 230));\n    const Ry = Math.min(H*0.42, H/2 - 64);\n    const np = this.nodes.map((n,i) => {\n      // entrance: emit from the nexus and flow outward (staggered)\n      const appear = Math.max(0, Math.min((el - (0.2 + i*0.18))/1.3, 1));\n      const rp = appear < 1 ? (1 - Math.pow(1-appear, 3)) : 1;\n      // continuous orbital revolution\n      const ang = n.ang0 + el*this.orbitSpeed;\n      const ca = Math.cos(ang), sa = Math.sin(ang);\n      const ox = ca*Rx*n.rf*rp, oy = sa*Ry*n.rf*rp;\n      const r = refs[i] && refs[i].current;\n      if (r){\n        const right = ca >= 0;            // label reads outward from the nexus\n        const gap = right ? 16 : -16;\n        r.style.textAlign = right ? 'left' : 'right';\n        r.style.transform = `translate(${(ox+gap).toFixed(2)}px,${oy.toFixed(2)}px) translate(${right ? '0%' : '-100%'},-50%)`;\n        r.style.opacity = appear.toFixed(3);\n      }\n      return {x:cx+ox, y:cy+oy, ap:appear};\n    });\n\n    // architectural grid\n    if (showGrid){\n      const ga = Math.min(el/1.1, 1)*0.045;\n      const sp = Math.max(46, minD/18);\n      ctx.lineWidth = 1;\n      ctx.strokeStyle = `rgba(140,160,205,${ga})`;\n      for (let x = -sp; x < W+sp; x += sp){ ctx.beginPath(); ctx.moveTo(x,-sp); ctx.lineTo(x,H+sp); ctx.stroke(); }\n      for (let y = -sp; y < H+sp; y += sp){ ctx.beginPath(); ctx.moveTo(-sp,y); ctx.lineTo(W+sp,y); ctx.stroke(); }\n    }\n\n    // expanding orbit rings\n    for (let k = 0; k < 3; k++){\n      const ph = ((el*0.10)+(k/3))%1;\n      const r = minD*0.06 + ph*minD*0.5;\n      const a = (1-ph)*0.07*introFade;\n      ctx.beginPath(); ctx.strokeStyle = `rgba(${A},${a})`; ctx.lineWidth = 1;\n      ctx.arc(cx,cy,r,0,7); ctx.stroke();\n    }\n    [0.20,0.33].forEach(f => { ctx.beginPath(); ctx.strokeStyle = `rgba(150,170,210,${0.05*introFade})`; ctx.arc(cx,cy,minD*f,0,7); ctx.stroke(); });\n\n    // central core glow\n    const corePulse = 0.5+0.5*Math.sin(el*1.3);\n    const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,minD*0.16);\n    cg.addColorStop(0, `rgba(${A},${(0.10+0.05*corePulse)*introFade})`);\n    cg.addColorStop(1, 'rgba(0,0,0,0)');\n    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(cx,cy,minD*0.16,0,7); ctx.fill();\n\n    // ambient particles + constellation\n    const rot = 0.000022*dt;\n    const rc = Math.cos(rot), rs   ctx.strokeStyle = lg; ctx.lineWidth = hov ? 3.4 : 2.4;\n      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(nx,ny); ctx.stroke();\n      // glass highlight edge\n      ctx.shadowBlur = 0;\n      ctx.strokeStyle = `rgba(120,150,225,${(hov?0.5:0.2)*ap})`;\n      ctx.lineWidth = hov ? 1 : 0.7;\n      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(nx,ny); ctx.stroke();\n      // charge flowing node -> nexus\n      if (ap >= 0.85){\n        const streaks = hov ? 3 : 2;\n        ctx.lineCap = 'round';\n        ctx.shadowBlur = hov ? 12 : 7;\n        ctx.shadowColor = 'rgba(60,100,200,0.6)';\n        for (let s=0;s<streaks;s++){\n          const t = ((el*0.17 + i*0.16 + s/streaks) % 1);\n          const head = 1 - t;            // 1 at node, 0 at nexus\n          const tail = Math.min(head + 0.12, 1);\n          const hx = cx+(nx-cx)*head, hy = cy+(ny-cy)*head;\n          const tx = cx+(nx-cx)*tail, ty = cy+(ny-cy)*tail;\n          const a = (hov?0.85:0.55)*Math.sin(t*Math.PI);\n          const sg = ctx.createLinearGradient(tx,ty,hx,hy);\n          sg.addColorStop(0, `rgba(40,70,150,0)`);\n          sg.addColorStop(1, `rgba(150,185,255,${a})`);\n          ctx.strokeStyle = sg; ctx.lineWidth = hov ? 2.2 : 1.5;\n          ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(hx,hy); ctx.stroke();\n          ctx.fillStyle = `rgba(195,215,255,${a})`;\n          ctx.beginPath(); ctx.arc(hx,hy,hov?2:1.3,0,7); ctx.fill();\n        }\n        ctx.lineCap = 'butt';\n        ctx.shadowBlur = 0;\n      }\n    }\n    ctx.restore();\n\n    // node glows\n    for (let i=0;i<np.length;i++){\n      const nf = np[i].ap;\n      if (nf <= 0) continue;\n      const hov = this.hovered === i;\n      const pulse = 0.6+0.4*Math.sin(el*1.7+i);\n      const R = (hov?22:14)*(0.8+0.2*pulse);\n      const g = ctx.createRadialGradient(np[i].x,np[i].y,0,np[i].x,np[i].y,R);\n      g.addColorStop(0, `rgba(${A},${(hov?0.75:0.45)*nf})`);\n      g.addColorStop(0.5, `rgba(${A},${(hov?0.25:0.14)*nf})`);\n      g.addColorStop(1, 'rgba(0,0,0,0)');\n      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(np[i].x,np[i].y,R,0,7); ctx.fill();\n      ctx.fillStyle = `rgba(233,239,250,${nf})`;\n      ctx.beginPath(); ctx.arc(np[i].x,np[i].y,hov?3:2.3,0,7); ctx.fill();\n    }\n\n    ctx.restore();\n\n    // vignette\n    const vg = ctx.createRadialGradient(cx,cy,minD*0.2,cx,cy,Math.max(W,H)*0.75);\n    vg.addColorStop(0, 'rgba(7,10,17,0)');\n    vg.addColorStop(1, 'rgba(2,4,9,0.85)');\n    ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);\n  }\n\n  renderVals(){\n    return {\n      canvasRef: this.canvasRef,\n      nodesLayerRef: this.nodesLayerRef,\n      titleLayerRef: this.titleLayerRef,\n      rootRef: this.rootRef,\n      nodeRef0: this.nodeRef0, nodeRef1: this.nodeRef1, nodeRef2: this.nodeRef2,\n      nodeRef3: this.nodeRef3, nodeRef4: this.nodeRef4, nodeRef5: this.nodeRef5,\n      onNodeEnter: (e) => { this.hovered = +e.currentTarget.dataset.idx; },\n      onNodeLeave: () => { this.hovered = -1; }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

<!-- KN ENTER-FIX: makes the decorative "ENTER" reliably clickable -> observatory.html.
     Appended safety patch; does not touch the bundled page. Idempotent. -->
<script>
(function(){
  if (window.__knEnterFix) return; window.__knEnterFix = 1;
  var TARGET = 'observatory.html';

  function go(e){
    if (e){ e.preventDefault(); e.stopPropagation(); }
    // Reuse the page's own cinematic entrance if present
    try { if (typeof window.knAudioArm === 'function') window.knAudioArm(); } catch(_){}
    try { sessionStorage.setItem('kn-entering','1'); } catch(_){}
    window.location.href = TARGET;
  }

  function isEnter(el){
    if (!el || !el.textContent) return false;
    var t = el.textContent.replace(/\s+/g,' ').trim().toUpperCase();
    return t === 'ENTER';
  }

  function wire(){
    var nodes = document.querySelectorAll('a,button,div,span,p,li');
    var hit = null;
    for (var i=0;i<nodes.length;i++){
      if (isEnter(nodes[i])){ hit = nodes[i]; break; }
    }
    if (hit){
      hit.style.cursor = 'pointer';
      hit.setAttribute('role','link');
      hit.setAttribute('tabindex','0');
      hit.setAttribute('aria-label','Enter — open the Observatory');
      hit.addEventListener('click', go, true);
      hit.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') go(e);
      }, true);
      return true;
    }
    return false;
  }

  function start(){
    if (wire()) return;
    // Bundle may render late: retry briefly, then observe the DOM.
    var tries = 0, iv = setInterval(function(){
      if (wire() || ++tries > 40) clearInterval(iv);  // ~10s max
    }, 250);
    try {
      var mo = new MutationObserver(function(){ if (wire()) mo.disconnect(); });
      mo.observe(document.documentElement, {childList:true, subtree:true});
    } catch(_){}
  }

  if (document.readyState === 'loading')
    document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>
